name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

  test-deploy:
    name: Test deploy
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    concurrency:
      group: cfblog-test-deploy
      cancel-in-progress: true
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CFBLOG_CLOUDFLARE_TOKEN }}
      CFBLOG_ACCESS_CLIENT_ID: ${{ secrets.CFBLOG_ACCESS_CLIENT_ID }}
      CFBLOG_ACCESS_CLIENT_SECRET: ${{ secrets.CFBLOG_ACCESS_CLIENT_SECRET }}
      CFBLOG_D1_DATABASE_ID: ${{ vars.CFBLOG_D1_DATABASE_ID }}
      CFBLOG_D1_DATABASE_NAME: ${{ vars.CFBLOG_D1_DATABASE_NAME }}
      CFBLOG_ENVIRONMENT: ${{ vars.CFBLOG_ENVIRONMENT }}
      CFBLOG_AUD_TOKEN: ${{ vars.CFBLOG_AUD_TOKEN }}
      CF_ACCESS_TEAM_DOMAIN: ${{ vars.CF_ACCESS_TEAM_DOMAIN }}
      CFBLOG_KV_NAMESPACE_ID: ${{ vars.CFBLOG_KV_NAMESPACE_ID }}
      CFBLOG_R2_BUCKET_NAME: ${{ vars.CFBLOG_R2_BUCKET_NAME }}
      CFBLOG_SITE_URL: ${{ vars.CFBLOG_SITE_URL }}
      CFBLOG_WORKER_NAME: ${{ vars.CFBLOG_WORKER_NAME }}
      WRANGLER_SEND_METRICS: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy configured test stack
        run: |
          pnpm build
          pnpm wrangler:config
          node --input-type=module <<'NODE'
          import fs from "node:fs";

          const astroConfig = JSON.parse(
            fs.readFileSync("dist/server/wrangler.json", "utf8")
          );
          const config = JSON.parse(
            fs.readFileSync("wrangler.generated.jsonc", "utf8")
          );

          config.main = "dist/server/entry.mjs";
          config.no_bundle = astroConfig.no_bundle;
          config.rules = astroConfig.rules;
          config.assets = {
            ...config.assets,
            directory: "dist/client"
          };
          config.vars = {
            ...config.vars,
            ...(process.env.CF_ACCESS_TEAM_DOMAIN
              ? { CF_ACCESS_TEAM_DOMAIN: process.env.CF_ACCESS_TEAM_DOMAIN }
              : {}),
            ...(process.env.CFBLOG_AUD_TOKEN
              ? { CF_ACCESS_AUD: process.env.CFBLOG_AUD_TOKEN }
              : {})
          };

          fs.writeFileSync(
            "wrangler.generated.jsonc",
            `${JSON.stringify(config, null, 2)}\n`,
            "utf8"
          );
          NODE
          pnpm wrangler d1 migrations apply CFBLOG_DB --remote --config wrangler.generated.jsonc
          pnpm wrangler deploy --config wrangler.generated.jsonc

      - name: Validate deployed public routes
        run: |
          set -euo pipefail

          site_url="${CFBLOG_SITE_URL%/}"
          cache_buster="ci=${GITHUB_RUN_ID:-manual}-${GITHUB_RUN_ATTEMPT:-0}"
          access_headers=(
            --header "CF-Access-Client-Id: $CFBLOG_ACCESS_CLIENT_ID"
            --header "CF-Access-Client-Secret: $CFBLOG_ACCESS_CLIENT_SECRET"
          )

          for attempt in $(seq 1 30); do
            home_body="$(curl --fail --silent --show-error --header "Cache-Control: no-cache" "$site_url/?$cache_buster")"
            admin_status="$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" --header "Cache-Control: no-cache" "$site_url/admin?$cache_buster")"

            if [ "$home_body" != "Hello World!" ] && { [ "$admin_status" = "302" ] || [ "$admin_status" = "403" ]; }; then
              break
            fi

            if [ "$attempt" = "30" ]; then
              echo "Deployment did not converge to the expected CFblog responses."
              echo "Home response snippet:"
              printf '%s\n' "$home_body" | head -c 500
              printf '\n/admin status: %s\n' "$admin_status"
              exit 1
            fi

            echo "Waiting for deployed Worker to propagate, attempt $attempt/30..."
            sleep 3
          done

          curl --fail --silent --show-error --output /dev/null "$site_url/?$cache_buster"
          curl --fail --silent --show-error --output /dev/null "$site_url/robots.txt?$cache_buster"
          curl --fail --silent --show-error --output /dev/null "$site_url/sitemap.xml?$cache_buster"
          curl --fail --silent --show-error --output /dev/null "$site_url/llms.txt?$cache_buster"
          curl --fail --silent --show-error --output /dev/null "$site_url/crawlers.json?$cache_buster"

          unauthenticated_admin_status="$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" "$site_url/admin?$cache_buster")"
          if [ "$unauthenticated_admin_status" != "302" ] && [ "$unauthenticated_admin_status" != "403" ]; then
            echo "Expected unauthenticated /admin to be protected with 302 or 403, got $unauthenticated_admin_status"
            exit 1
          fi

          authenticated_admin_status="$(curl --location --silent --show-error --output /dev/null --write-out "%{http_code}" "${access_headers[@]}" "$site_url/admin?$cache_buster")"
          if [ "$authenticated_admin_status" != "200" ]; then
            echo "Expected service-token authenticated /admin to return 200, got $authenticated_admin_status"
            exit 1
          fi
