name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build
        run: pnpm build

  test-deploy:
    name: Test deploy
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    concurrency:
      group: cfblog-test-deploy
      cancel-in-progress: true
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CFBLOG_CLOUDFLARE_TOKEN }}
      CFBLOG_D1_DATABASE_ID: ${{ vars.CFBLOG_D1_DATABASE_ID }}
      CFBLOG_D1_DATABASE_NAME: ${{ vars.CFBLOG_D1_DATABASE_NAME }}
      CFBLOG_ENVIRONMENT: ${{ vars.CFBLOG_ENVIRONMENT }}
      CFBLOG_KV_NAMESPACE_ID: ${{ vars.CFBLOG_KV_NAMESPACE_ID }}
      CFBLOG_R2_BUCKET_NAME: ${{ vars.CFBLOG_R2_BUCKET_NAME }}
      CFBLOG_SITE_URL: ${{ vars.CFBLOG_SITE_URL }}
      CFBLOG_WORKER_NAME: ${{ vars.CFBLOG_WORKER_NAME }}
      WRANGLER_SEND_METRICS: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy configured test stack
        run: |
          pnpm build
          pnpm wrangler:config
          pnpm wrangler d1 migrations apply CFBLOG_DB --remote --config wrangler.generated.jsonc
          pnpm wrangler deploy --config wrangler.generated.jsonc

      - name: Validate deployed public routes
        run: |
          set -euo pipefail

          site_url="${CFBLOG_SITE_URL%/}"

          curl --fail --silent --show-error "$site_url/"
          curl --fail --silent --show-error "$site_url/robots.txt"
          curl --fail --silent --show-error "$site_url/sitemap.xml"
          curl --fail --silent --show-error "$site_url/llms.txt"
          curl --fail --silent --show-error "$site_url/crawlers.json"

          admin_status="$(curl --silent --show-error --output /dev/null --write-out "%{http_code}" "$site_url/admin")"
          if [ "$admin_status" != "403" ]; then
            echo "Expected /admin to fail closed with 403, got $admin_status"
            exit 1
          fi
